app = "validator-mcp"
primary_region = "lhr"

[build]

[env]
  TRANSPORT = "sse"
  DB_MODE = "sqlite"
  DB_PATH = "/data/validator.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "validator_data"
  destination = "/data"
